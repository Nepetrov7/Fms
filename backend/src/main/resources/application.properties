spring.application.name=fms

# Не создавать дефолтного пользователя Spring Security (используем JWT)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Database Configuration
spring.datasource.url=jdbc:h2:mem:fmsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=8080

# JWT (HS256, секрет не короче 32 байт)
app.jwt.secret=MySuperSecureJwtSecretKeyForFms2024MustBe32BytesLong!!
app.jwt.expiration-ms=86400000
